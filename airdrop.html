<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 Lobster Token | Airdrop</title>
    <link rel="stylesheet" href="css/navbar-redesign.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #050811 50%, #1a2236 100%);
            color: #e2e8f0;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
            padding-top: 5rem;
        }
        
        .task-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .btn {
            background: linear-gradient(135deg, #00d4aa 0%, #0088cc 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.3);
        }
        
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        
        .success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span>🦞</span>
            <span>Lobster Token</span>
        </a>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="mint.html" class="nav-link">Mint</a>
            <a href="airdrop.html" class="nav-link active">Airdrop</a>
            <a href="trade.html" class="nav-link">Trade</a>
            <a href="about.html" class="nav-link">About</a>
            <button class="connect-wallet" id="connectButton">Connect Wallet</button>
        </div>
    </nav>

    <main class="container">
        <h1 style="color: #00d4aa;">🦞 Airdrop Tasks</h1>
        <p style="color: #94a3b8;">Complete tasks to earn points!</p>
        
        <!-- 任务1 -->
        <div class="task-card">
            <h3 style="color: #00d4aa;">Follow @Lobster_Tempo on X</h3>
            <p style="color: #94a3b8;">Follow our official X account</p>
            <button class="btn" onclick="openXProfile()">Open X Profile</button>
            <button class="btn" onclick="verifyTask('follow')">Verify Follow</button>
            <span id="followStatus"></span>
        </div>
        
        <!-- 任务2 -->
        <div class="task-card">
            <h3 style="color: #00d4aa;">Quote Our Tweet</h3>
            <p style="color: #94a3b8;">Quote our announcement tweet</p>
            <button class="btn" onclick="openTweet()">Open Tweet</button>
            <button class="btn" onclick="verifyTask('quote')">Verify Quote</button>
            <span id="quoteStatus"></span>
        </div>
        
        <!-- 任务3 -->
        <div class="task-card">
            <h3 style="color: #00d4aa;">Like Our Tweet</h3>
            <p style="color: #94a3b8;">Like our announcement tweet</p>
            <button class="btn" onclick="openTweet()">Open Tweet</button>
            <button class="btn" onclick="verifyTask('like')">Verify Like</button>
            <span id="likeStatus"></span>
        </div>
        
        <!-- 状态显示 -->
        <div id="status" class="status"></div>
    </main>

    <script>
        // 简单的按钮功能
        function openXProfile() {
            window.open('https://x.com/Lobster_Tempo', '_blank');
            showStatus('Opened X profile!', 'success');
        }
        
        function openTweet() {
            window.open('https://x.com/Lobster_Tempo/status/2040564694776479999?s=20', '_blank');
            showStatus('Opened tweet!', 'success');
        }
        
        function verifyTask(taskId) {
            const statusElement = document.getElementById(taskId + 'Status');
            if (statusElement) {
                statusElement.textContent = '✅ Verified!';
                statusElement.style.color = '#10b981';
                showStatus('Task verified successfully!', 'success');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
        
        // 连接钱包按钮
        document.getElementById('connectButton').addEventListener('click', async function() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    this.disabled = true;
                    this.textContent = 'Connecting...';
                    
                    const accounts = await window.ethereum.request({ 
                        method: 'eth_requestAccounts' 
                    });
                    
                    if (accounts.length > 0) {
                        const shortAddress = accounts[0].substring(0, 6) + '...' + accounts[0].substring(accounts[0].length - 4);
                        this.textContent = `Connected: ${shortAddress}`;
                        this.disabled = true;
                        showStatus('Wallet connected!', 'success');
                    }
                } catch (error) {
                    this.disabled = false;
                    this.textContent = 'Connect Wallet';
                    showStatus('Connection failed: ' + error.message, 'error');
                }
            } else {
                showStatus('Please install MetaMask!', 'error');
            }
        });
        
        console.log('Airdrop page loaded successfully!');
    </script>
</body>
</html>
